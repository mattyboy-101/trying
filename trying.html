<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>RTS Stock Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f0;min-height:100vh;padding:8px;padding-bottom:42px;font-family:'Inter','SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif;font-size:11px;user-select:none}
.toolbar{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#e8e8e2;border-radius:5px;border:1px solid #d0d0c8;margin-bottom:3px;flex-wrap:wrap}
.toolbar b{font-size:13px;letter-spacing:2px;color:#222}
.toolbar .sub{color:#888;font-size:8px;margin-left:3px}
.sel{font-size:9px;font-family:inherit;border:1px solid #bbb;border-radius:3px;padding:2px 4px;background:#fff;cursor:pointer}
.sep{width:1px;height:14px;background:#ccc}
.add-btn{padding:2px 8px;font-size:9px;border:1px solid #4a9e4a;border-radius:3px;cursor:pointer;font-family:inherit;background:#4a9e4a;color:#fff;font-weight:700}
.clear-btn{padding:2px 6px;font-size:8px;border:1px solid #c62828;border-radius:3px;cursor:pointer;font-family:inherit;background:#fff;color:#c62828;font-weight:600}
.cnt{font-size:8px;color:#999}
.mode-btn{padding:2px 8px;font-size:9px;border:1px solid #888;border-radius:3px;cursor:pointer;font-family:inherit;background:#fff;color:#555;font-weight:600;transition:all .1s}
.mode-btn.active{background:#222;color:#fff;border-color:#222}

/* Industry fixed bottom bar */
.sec-label{display:inline-flex;align-items:center;padding:2px 8px;margin:1px 2px 1px 4px;border-radius:3px;font-size:8px;font-weight:800;letter-spacing:1px;cursor:pointer;border:1.5px solid transparent;transition:all .1s;text-transform:uppercase}
.sec-label:hover{filter:brightness(1.2);transform:scale(1.03)}
.sec-label.on{border-color:#fdd835;box-shadow:0 0 4px rgba(253,216,53,.3);background:#fdd835;color:#111}
.sec-label.sec-active{border-color:#fdd835!important;background:#fdd835!important;filter:none!important;color:#111!important;box-shadow:none!important}
.sec-sep{width:1px;height:16px;background:#444;margin:0 2px;flex-shrink:0}
.ind-bar{position:fixed;bottom:0;left:0;right:0;z-index:900;background:#e2e1dc;border-top:1px solid #ccc;box-shadow:0 -2px 8px rgba(0,0,0,.1);transition:transform .25s ease}
.ind-bar.folded{transform:translateY(calc(100% - 22px))}
.ind-fold-tab{display:none;height:22px;background:#d5d4cf;border-bottom:1px solid #ccc;cursor:pointer;text-align:center;font-size:8px;font-weight:800;color:#666;letter-spacing:1px;line-height:22px;user-select:none}
.ind-fold-tab:hover{background:#c8c7c2;color:#333}
.ind-bar.folded .ind-fold-tab{display:block}

/* Theme & Industry bars */
.tbar{display:flex;flex-wrap:wrap;gap:2px;padding:2px 6px;margin-bottom:2px;background:#eae9e4;border-radius:3px;align-items:center;min-height:16px}
.tbar-hd{font-size:7px;font-weight:800;color:#888;letter-spacing:1px;margin-right:3px;text-transform:uppercase;flex-shrink:0}
.tchip{display:inline-flex;align-items:center;gap:2px;padding:1px 4px;border-radius:3px;cursor:pointer;border:1.5px solid transparent;transition:all .12s;font-size:8px;background:rgba(255,255,255,.35)}

.cell.search-match{outline:3px solid #ff6d00!important;outline-offset:-1px;z-index:2;background:#fff3e0!important;animation:pulse-search .6s ease infinite alternate}
.cell.search-dim{opacity:.15}
@keyframes pulse-search{from{box-shadow:0 0 4px rgba(255,109,0,.4)}to{box-shadow:0 0 12px rgba(255,109,0,.7)}}
.tchip:hover{background:rgba(255,255,255,.8)}
.tchip.on{border-color:#fdd835;background:#fdd835;font-weight:800;color:#111}
.tchip.ind-active{background:#fdd835!important;border-color:#fdd835!important;box-shadow:none!important;transform:none!important}
.tchip.ind-active .tlbl{color:#111!important;font-weight:800!important}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
.tchip .tlbl{white-space:nowrap}
.add-t{font-size:9px;color:#aaa;cursor:pointer;padding:0 3px;flex-shrink:0}
.add-t:hover{color:#4a9e4a}
.exp-btn{font-size:7px;color:#666;cursor:pointer;padding:1px 5px;border:1px solid #ccc;border-radius:2px;background:#fff;font-family:inherit;margin-left:2px;flex-shrink:0}
.exp-btn:hover{background:#ddd}
.exp-btn.on{background:#333;color:#fff;border-color:#333}
.cell .hi{color:#00c853;font-size:6px;font-weight:900;position:absolute;bottom:-1px;left:0}
.cell .lo{color:#c62828;font-size:6px;font-weight:900;position:absolute;bottom:-1px;left:0}

/* Grid */
.grid{overflow-x:auto}
.row{display:flex}
.hdr-b{flex:10;background:#4a9e4a;color:#fff;text-align:center;padding:4px 0;font-weight:bold;font-size:11px;letter-spacing:2px}
.hdr-r{flex:10;background:#cc3333;color:#fff;text-align:center;padding:4px 0;font-weight:bold;font-size:11px;letter-spacing:2px}
.gc{flex:1;min-width:52px;text-align:center;padding:2px 1px;font-size:10px;font-weight:bold;border-right:1px solid rgba(255,255,255,.3)}
.gc .n{font-size:8px;opacity:.8}
.cell{flex:1;min-width:52px;border-right:1px solid #ddd;border-bottom:1px solid #eee;text-align:center;padding:2px 1px;font-size:9.5px;font-weight:600;min-height:19px;cursor:pointer;position:relative;transition:background .1s}
.cell:hover{background:rgba(21,101,192,.08)!important}
.cell:hover{background:#fffde7!important}
.cell.active{background:#ff6d00!important;color:#fff!important;box-shadow:inset 0 0 0 2px #e65100,0 0 12px rgba(255,109,0,.6);z-index:1;border-radius:3px;text-shadow:0 1px 2px rgba(0,0,0,.4);transform:scale(1.08);transition:transform .15s ease}
.cell:hover{outline:2px solid #ff6d00;outline-offset:-2px;z-index:1}
.analysis-panel{position:fixed;top:0;right:0;width:560px;height:100vh;background:#111;color:#e0e0e0;z-index:2000;box-shadow:-4px 0 24px rgba(0,0,0,.6);display:flex;flex-direction:column;font-family:inherit;transform:translateX(100%);transition:transform .25s ease}
.analysis-panel.open{transform:translateX(0)}
.ap-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#0a0a0a;border-bottom:1px solid #333;flex-shrink:0}
.ap-hdr .ap-tk{font-size:18px;font-weight:900;color:#fff;letter-spacing:1px}
.ap-hdr .ap-gr{font-size:10px;padding:2px 8px;border-radius:3px;color:#fff;font-weight:700;margin-left:6px}
.ap-hdr .ap-th{font-size:8px;color:#888;margin-left:6px}
.ap-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:2px 6px}
.ap-close:hover{color:#fff}
.ap-tabs{display:flex;background:#0a0a0a;border-bottom:1px solid #333;flex-shrink:0;overflow-x:auto}
.ap-tab{padding:6px 10px;font-size:8px;font-weight:700;letter-spacing:.5px;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .1s}
.ap-tab:hover{color:#ccc;background:#1a1a1a}
.ap-tab.on{color:#fdd835;border-color:#fdd835}
.ap-body{flex:1;overflow-y:auto;padding:10px 12px}
.ap-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#888}
.ap-loading .spinner{width:28px;height:28px;border:3px solid #333;border-top:3px solid #fdd835;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ap-s{margin-bottom:12px}
.ap-sh{font-size:7px;font-weight:800;letter-spacing:2px;color:#fdd835;text-transform:uppercase;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #333}
.ap-r{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(255,255,255,.04)}
.ap-r .l{color:#999}.ap-r .v{font-weight:700}
.ap-r .v.g{color:#00c853}.ap-r .v.r{color:#f44336}.ap-r .v.y{color:#fdd835}.ap-r .v.o{color:#ff9800}
.ap-t{font-size:10px;line-height:1.5;color:#ccc;margin-bottom:4px}
.ap-check{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(255,255,255,.04)}
.ap-check .icon{font-size:12px;width:18px;text-align:center}
.ap-check .txt{flex:1;color:#ccc}
.ap-check.pass .txt{color:#e0e0e0}.ap-check.fail .txt{color:#888}
.ap-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;margin:1px 2px}
.ap-tag.bull{background:rgba(0,200,83,.15);color:#00c853;border:1px solid rgba(0,200,83,.3)}
.ap-tag.bear{background:rgba(244,67,54,.15);color:#f44336;border:1px solid rgba(244,67,54,.3)}
.ap-tag.neut{background:rgba(255,255,255,.08);color:#999;border:1px solid rgba(255,255,255,.15)}
.ap-tag.cat{background:rgba(253,216,53,.12);color:#fdd835;border:1px solid rgba(253,216,53,.3)}
.ap-verdict{padding:8px 10px;border-radius:6px;margin:8px 0;font-size:10px;line-height:1.5}
.ap-verdict.buy{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);color:#69f0ae}
.ap-verdict.wait{background:rgba(253,216,53,.1);border:1px solid rgba(253,216,53,.3);color:#fff176}
.ap-verdict.avoid{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);color:#ef9a9a}
.ap-hero{display:flex;gap:10px;padding:10px;border-radius:6px;margin-bottom:10px;align-items:center}
.ap-hero .score{font-size:36px;font-weight:900;letter-spacing:-2px;line-height:1}
.ap-hero .score-sub{font-size:7px;color:#999;text-transform:uppercase;letter-spacing:1px}
.ap-chip{padding:2px 6px;background:#1a1a1a;border:1px solid #444;border-radius:3px;font-size:9px;font-weight:600;cursor:pointer;color:#e0e0e0;display:inline-block;margin:2px}
.ap-chip:hover{background:#333;border-color:#fdd835}
.ap-bar{height:6px;border-radius:3px;background:#222;overflow:hidden;margin:3px 0}
.ap-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.ap-nav{display:flex;gap:4px;padding:8px 12px;background:#0a0a0a;border-top:1px solid #333;flex-shrink:0}
.ap-nav button{flex:1;padding:6px;border:1px solid #444;border-radius:4px;background:#1a1a1a;color:#ddd;font-family:inherit;font-size:9px;font-weight:700;cursor:pointer}
.ap-nav button:hover{background:#333;border-color:#fdd835}
.cell .flag{position:absolute;top:-1px;right:0;font-size:7px}
.cell .ab{position:absolute;bottom:-1px;right:0;font-size:5px;background:#ff9800;color:#fff;border-radius:2px;padding:0 2px;line-height:1.3}
.cell .ab.hit{background:#c62828;animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.5}}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:2px;vertical-align:middle;cursor:pointer;border:1px solid rgba(0,0,0,.15)}
.dot:hover{transform:scale(1.5);box-shadow:0 0 3px rgba(0,0,0,.3)}
.cell.empty{cursor:default;color:transparent}

/* Context menu */
.ctx{position:fixed;z-index:2000;background:#fff;border:1px solid #ccc;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.2);min-width:190px;padding:3px 0;font-size:10px}
.ctx div{padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.ctx div:hover{background:#f0f0ea}
.ctx .s2{height:1px;background:#eee;margin:2px 0;padding:0;cursor:default}
.ctx .s2:hover{background:#eee}
.ctx .red{color:#c62828}
.ctx .hd{font-weight:700;color:#222;padding:6px 12px 2px;cursor:default;font-size:11px}
.ctx .inf{font-size:8px;color:#888;padding:1px 12px 4px;cursor:default}

/* Chart */
.chart-w{position:fixed;z-index:1800;background:#fff;border:1px solid #999;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.3);overflow:hidden;display:flex;flex-direction:column}
.chart-h{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:#f0f0ea;border-bottom:1px solid #ddd;cursor:move;flex-shrink:0}
.chart-h span{font-weight:800;font-size:12px}
.chart-h button{border:none;background:transparent;cursor:pointer;font-size:13px;padding:1px 5px;border-radius:3px}
.chart-h button:hover{background:#ddd}
.chart-b{flex:1}

.toast{position:fixed;top:10px;right:10px;z-index:3000;background:#2e7d32;color:#fff;padding:6px 16px;border-radius:4px;font-size:10px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.2);transition:opacity .3s}
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.01)}
.modal-bg{position:fixed;inset:0;z-index:2500;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;padding:16px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.25);font-family:inherit}
.modal h3{font-size:13px;margin-bottom:10px;font-weight:800}
.modal label{font-size:8px;color:#666;display:block;margin-bottom:2px;letter-spacing:1px}
.modal input,.modal select{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;font-family:inherit;font-size:11px;margin-bottom:8px}
.modal .r2{display:flex;gap:6px}
.modal .mb{flex:1;padding:7px;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-family:inherit;font-size:11px}
.modal .mg{background:#4a9e4a;color:#fff}
.modal .mo{background:#f57c00;color:#fff}
.modal .mc{background:#eee;color:#555}

/* Chart grid view */
.view-toggle{display:inline-flex;border:1px solid #ccc;border-radius:4px;overflow:hidden;margin-left:4px}
.view-toggle button{border:none;padding:2px 8px;font-size:8px;font-family:inherit;cursor:pointer;background:#fff;color:#666;font-weight:600;border-right:1px solid #ccc}
.view-toggle button:last-child{border-right:none}
.view-toggle button.on{background:#222;color:#fff}
.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px 0}
.chart-card{background:#fff;border:1px solid #ddd;border-radius:6px;overflow:hidden;position:relative;transition:box-shadow .15s}
.chart-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.15)}
.chart-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#f8f8f5;border-bottom:1px solid #eee}
.chart-card-hdr .tk{font-weight:700;font-size:11px}
.chart-card-hdr .grd{font-size:8px;padding:1px 5px;border-radius:3px;color:#fff;font-weight:700}
.chart-card-hdr .thm{font-size:7px;color:#888;margin-left:4px}
.chart-card-actions{display:flex;gap:3px;align-items:center}
.chart-card-actions button{border:none;background:transparent;cursor:pointer;font-size:12px;padding:1px 3px;border-radius:3px}
.chart-card-actions button:hover{background:#eee}
.chart-card-actions button.flagged{background:#fffde7}
.chart-card-body{height:200px;position:relative}
.chart-card-body iframe{width:100%;height:100%;border:none}
.chart-card-body .load-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:10px;background:linear-gradient(90deg,#f0f0eb 25%,#e8e8e3 50%,#f0f0eb 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.grade-filter-bar{display:flex;gap:3px;padding:4px 0;align-items:center;flex-wrap:wrap}
.grade-filter-bar span{font-size:8px;color:#888;font-weight:600}
.gf-btn{padding:2px 6px;font-size:8px;border:1px solid #ddd;border-radius:3px;cursor:pointer;background:#fff;font-family:inherit;font-weight:600;color:#555}
.gf-btn:hover{background:#eee}
.gf-btn.on{background:#222;color:#fff;border-color:#222}
.chart-count{font-size:8px;color:#aaa;margin-left:6px}

.footer{margin-top:4px;font-size:7px;color:#aaa;text-align:center}
</style>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

function showCloudStatus(msg){
  var el=document.getElementById("cloudStatus");
  if(!el)return;
  var isErr=msg.indexOf("Error")>=0||msg.indexOf("Err")>=0;
  var isOk=msg.indexOf("Synced")>=0||msg.indexOf("Restored")>=0;
  el.textContent=msg;
  el.style.color=isErr?"#f44336":isOk?"#00c853":"#fdd835";
  clearTimeout(window._cloudStatusTimer);
  window._cloudStatusTimer=setTimeout(function(){
    var ls=localStorage.getItem("rts_last_sync");
    el.textContent=ls?"last sync "+ls:"click to sync";
    el.style.color="#555";
  },4000);
}

window.cloudBackupNow=function(){

  var binId=localStorage.getItem("jsonbin_id");
  var payload={d:data,f:flags,a:alerts,t:themes,vm:viewMode,saved:new Date().toISOString()};
  var statusEl=document.getElementById("cloudStatus");
  if(statusEl){statusEl.textContent="Saving...";statusEl.style.color="#fdd835";}
  if(!binId){
    fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":binKey,"X-Bin-Name":"RTS-Analyzer"},
      body:JSON.stringify(payload)
    }).then(function(r){if(!r.ok)throw new Error("API "+r.status+(r.status===401?" (invalid key)":r.status===429?" (rate limited)":""));return r.json();}).then(function(d){
      if(d.metadata&&d.metadata.id){
        localStorage.setItem("jsonbin_id",d.metadata.id);
        showCloudStatus("Synced");
        flash("Cloud sync active! Bin: "+d.metadata.id);
      } else {
        showCloudStatus("Error");
        flash("Cloud error: "+(d.message||"check your key"));
      }
    }).catch(function(e){showCloudStatus("Error");flash("Backup failed: "+e.message);});
  } else {
    fetch("https://api.jsonbin.io/v3/b/"+binId,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":binKey,"X-Bin-Versioning":"false"},
      body:JSON.stringify(payload)
    }).then(function(){
      var t=new Date();
      var ts=t.getHours()+":"+(t.getMinutes()<10?"0":"")+t.getMinutes();
      localStorage.setItem("rts_last_sync",ts);
      showCloudStatus("Synced "+ts);
    }).catch(function(){showCloudStatus("Error");flash("Backup failed - check key");});
  }
};

    headers:{"X-Master-Key":binKey}

function filtered(arr,g){
  if(!arr)return[];
  if(_filteredCache&&g&&_filteredCache[g])return _filteredCache[g];
  var anyT=Object.keys(selThemes).length>0;
  var anyI=Object.keys(selInds).length>0;

  else{
    // All mode: show top 200 by default, full market only after Load All
    base=arr.slice();
    if(!window._allLoaded){
      // Limit to top grades only (first 200 tickers across top grades)
      var top200=[];
      var topGrades=["A+","A","A-","B+","B","B-","C+","C","C-","D+","D","D-"];
      topGrades.forEach(function(tg){
        (data[tg]||[]).forEach(function(t){
          if(top200.length<200)top200.push(t);
        });
      });
      base=top200;
    }
  }
  var result;
  if(!anyT&&!anyI&&!filterSec){result=sortTickers(base);}
  else{
    // Sort: highlighted stocks first, rest after
    var matched=[], unmatched=[];
    sortTickers(base).forEach(function(t){
      if(isHighlighted(t)) matched.push(t); else unmatched.push(t);
    });
    result=matched.concat(unmatched);
  }
  if(g&&_filteredCache)_filteredCache[g]=result; // cache for this render
  return result;
}
function sortTickers(arr){
  if(sortMode==="none"||arr.length<2)return arr;
  if(sortMode==="pctday"){
    return arr.slice().sort(function(a,b){
      var pa=_pctCache[a]!=null?_pctCache[a]:-9999;
      var pb=_pctCache[b]!=null?_pctCache[b]:-9999;
      return pb-pa;
    });
  }
  return arr.slice().sort(function(a,b){
    var ia=TI[a]||["zzz","zzz","zzz"],ib=TI[b]||["zzz","zzz","zzz"];
    if(sortMode==="theme")return ia[0]<ib[0]?-1:ia[0]>ib[0]?1:0;
    return ia[1]<ib[1]?-1:ia[1]>ib[1]?1:0;
  });
}
function fetchPctDay(callback){
  var today=new Date().toDateString();
  if(_pctCacheDate===today&&Object.keys(_pctCache).length>0){if(callback)callback();return;}
  if(_pctFetching){if(callback)setTimeout(function(){if(callback)callback();},1500);return;}
  var tickers=[];
  G.forEach(function(g){(data[g]||[]).forEach(function(t){tickers.push(t);});});
  if(!tickers.length){if(callback)callback();return;}
  _pctFetching=true;
  _pctError='';
  // FMP /quote supports up to ~50 tickers per call
  var chunks=[];
  for(var i=0;i<tickers.length;i+=50)chunks.push(tickers.slice(i,i+50));
  var done=0;
  function doChunk(chunk){
    fmpFetch("/quote/"+chunk.join(","))
      .then(function(d){
        var arr=Array.isArray(d)?d:[];
        arr.forEach(function(q){
          if(q.symbol&&q.changesPercentage!=null)
            _pctCache[q.symbol]=parseFloat(q.changesPercentage);
        });
        done++;if(done===chunks.length){_pctCacheDate=today;_pctFetching=false;if(callback)callback();}
      }).catch(function(){
        done++;_pctError='err';
        if(done===chunks.length){_pctFetching=false;if(callback)callback();}
      });
  }
  // Stagger requests slightly to avoid rate limits
  chunks.forEach(function(chunk,i){setTimeout(function(){doChunk(chunk);},i*150);});
}

function sectorIndColor(sector,idx,total){

  if(!hsl)return"#999";
  var h=hsl[0],s=hsl[1];
  var lightBase=28,lightRange=42;
  var l=lightBase+Math.round((idx/(Math.max(total-1,1)))*lightRange);

function isHighlighted(t){
  var anyT=Object.keys(selThemes).length>0;
  var anyI=Object.keys(selInds).length>0;
  if(!anyT&&!anyI&&!filterSec) return false;
  var info=TI[t]||['','',[]];
  var tags=info[2]||[info[0]]; // fallback to primary if no tags
  // Match if ANY of the stock's tags match ANY selected theme
  var matchT=anyT&&tags.some(function(tag){return !!selThemes[tag];});
  var matchI=anyI&&selInds[info[1]];
  var matchS=filterSec&&info[1]===filterSec;
  return !!(matchT||matchI||matchS);
}

var _sentinelObserver=null;
function _attachSentinel(){
  // Disconnect old sentinel observer
  if(_sentinelObserver){_sentinelObserver.disconnect();_sentinelObserver=null;}
  var sentinel=document.getElementById("chartLoadSentinel");
  if(!sentinel)return;
  _sentinelObserver=new IntersectionObserver(function(entries){
    if(!entries[0].isIntersecting)return;
    _sentinelObserver.disconnect();_sentinelObserver=null;
    loadMoreCharts();
  },{rootMargin:"600px 0px"}); // trigger 600px before sentinel is visible
  _sentinelObserver.observe(sentinel);
}

var _chartObserver=null; // single global observer — disconnected before reuse

function lazyLoadCharts(){
  var grid=document.getElementById("chartGrid");
  if(!grid)return;
  // Disconnect any previous observer so stale ones don't keep firing
  if(_chartObserver){_chartObserver.disconnect();_chartObserver=null;}
  _chartQueue=[];  // reset queue for this render
  var cards=grid.querySelectorAll(".chart-card");

  var observer=new IntersectionObserver(function(entries){
    var added=false;
    entries.forEach(function(entry){
      if(!entry.isIntersecting)return;
      var card=entry.target;
      var ticker=card.getAttribute("data-ticker");
      var ccId='cc_'+ticker.replace(/[^A-Za-z0-9]/g,'_');
      var body=document.getElementById(ccId);
      // Already loaded — just unobserve
      if(!body||body.getAttribute("data-loaded")==="1"){observer.unobserve(card);return;}
      var alreadyIdx=_chartQueue.findIndex(function(j){return j.ccId===ccId;});
      var isVisible=card.getBoundingClientRect().top<window.innerHeight;
      if(alreadyIdx>=0){
        if(isVisible){_chartQueue.splice(alreadyIdx,1);_chartQueue.unshift({ticker:ticker,ccId:ccId});}
      }else{
        if(isVisible)_chartQueue.unshift({ticker:ticker,ccId:ccId});
        else _chartQueue.push({ticker:ticker,ccId:ccId});
        added=true;
      }
      observer.unobserve(card);
    });
    if(added)_chartWorker();
  },{
    // 400px lookahead for smooth scroll
    rootMargin:"400px 0px"
  });
  _chartObserver=observer; // store so we can disconnect on next lazyLoadCharts call

  var allTickers=[];
  cards.forEach(function(card){
    var ticker=card.getAttribute("data-ticker");
    var ccId='cc_'+ticker.replace(/[^A-Za-z0-9]/g,'_');
    var body=document.getElementById(ccId);
    // Skip already-loaded cards entirely
    if(body&&(body.getAttribute("data-loaded")==="1"||body.getAttribute("data-loaded")==="2"))return;
    observer.observe(card);
    if(ticker)allTickers.push(ticker);
  });
  // Fetch ER dates for all visible tickers
  if(allTickers.length) setTimeout(function(){queueERFetch(allTickers);},500);
  // Auto-load next batch when user scrolls to bottom
  _attachSentinel();
}

      else{var s=document.createElement('span');s.className='flag';s.textContent=icon;cell.appendChild(s);}

  document.querySelectorAll('.chart-card[data-ticker="'+t+'"]').forEach(function(card){

function callAnalysis(ticker,grade,info,rs){
  var theme=info[0],industry=info[1];
  
  // Find related tickers in same theme (top grades)
  var related=[];var relatedAll=[];
  G.forEach(function(g){
    (data[g]||[]).forEach(function(t){
      if(t===ticker)return;
      var ti=TI[t];
      if(ti&&ti[0]===theme){
        relatedAll.push({t:t,g:g});
        if(G.indexOf(g)<6)related.push({t:t,g:g});
      }
    });
  });
  var relatedStr=related.length?related.map(function(r){return r.t+"("+r.g+")"}).join(", "):"None in top grades";
  
  // Build analysis object
  var analysis={
    setup:{score:"?",summary:"Loading...",action:"Fetching data..."},
    live:{},earnings:{},catalysts:{narrative:"Loading..."},
    risk:{level:"?",factors:[]},
    connections:{leaders:[],sympathy:[],note:""},
    market_context:{sector_strength:"?",rotation_note:""}
  };
  
  // Leaders = same theme in top 6 grades
  analysis.connections.leaders=related.slice(0,8).map(function(r){return r.t;});
  // Sympathy = same theme in lower grades
  analysis.connections.sympathy=relatedAll.filter(function(r){return G.indexOf(r.g)>=6;}).slice(0,6).map(function(r){return r.t;});
  
  // Sector strength
  var topCount=related.filter(function(r){return G.indexOf(r.g)<6;}).length;
  var botCount=relatedAll.filter(function(r){return G.indexOf(r.g)>=14;}).length;
  analysis.market_context.sector_strength=topCount>botCount*2?"Strong":topCount>botCount?"Neutral":"Weak";
  analysis.market_context.rotation_note=topCount+" peers in top grades, "+botCount+" in bottom. "+(topCount>5?"Heavy institutional rotation into "+theme+".":topCount>2?"Moderate interest in "+theme+".":"Light interest \u2014 "+theme+" not in focus.");
  
  // Render immediately with what we have
  renderAnalysis(ticker,grade,info,rs,analysis,relatedStr);
  
  // Now fetch live data from Polygon
  var fetches=[];
  
  // 1. Snapshot for this ticker + SPY + QQQ + sector ETF
  var sectorETF=SECTOR_ETFS[theme]||SECTOR_ETFS[industry]||"";
  var snapTickers=[ticker,"SPY","QQQ"];
  if(sectorETF&&snapTickers.indexOf(sectorETF)<0)snapTickers.push(sectorETF);
  
  // 2. Historical bars (1 year for MAs + ADR)
  var today=new Date().toISOString().slice(0,10);
  var oneYearAgo=new Date(Date.now()-365*24*60*60*1000).toISOString().slice(0,10);
  
  // 3. Company details
  // 4. News
  
  Promise.all([
    polySnapshot(snapTickers),
    polyBars(ticker,oneYearAgo,today,252),
    polyDetails(ticker).catch(function(){return {results:{}};}),
    polyNews(ticker,5).catch(function(){return {results:[]};}),
    fetchEarningsLatest(ticker),
    fetchEarningsHistory(ticker)
  ]).then(function(results){

    var snapResp=results[0];
    var barsResp=results[1];
    var detailsResp=results[2];
    var newsResp=results[3];
    var fdLatest=results[4];
    var fdHistory=results[5];
    // legacy compat
    var earningsResp=fdHistory;
    var surpriseResp=[];
    
    // Parse snapshot
    var snapMap={};
    if(snapResp&&snapResp.tickers){
      snapResp.tickers.forEach(function(s){snapMap[s.ticker]=s;});
    }
    var snap=snapMap[ticker];
    var spySnap=snapMap["SPY"];
    var qqqSnap=snapMap["QQQ"];
    var etfSnap=sectorETF?snapMap[sectorETF]:null;
    
    // Parse bars
    var bars=(barsResp&&barsResp.results)||[];
    
    // Parse details
    var details=(detailsResp&&detailsResp.results)||{};
    
    // Parse news
    var news=(newsResp&&newsResp.results)||[];
    
    // Calculate MAs from bars
    var sma50=calcSMA(bars,50);
    var sma200=calcSMA(bars,200);
    var ema20=calcEMA(bars,20);
    var ema50=calcEMA(bars,50);
    var adr=calcADR(bars,14);
    
    // 52-week high/low from bars
    var yearHigh=0,yearLow=999999;
    bars.forEach(function(b){
      if(b.h>yearHigh)yearHigh=b.h;
      if(b.l<yearLow)yearLow=b.l;
    });
    
    // Live data
    var price=snap&&snap.day?snap.day.c:0;
    var dayOpen=snap&&snap.day?snap.day.o:0;
    var dayHigh=snap&&snap.day?snap.day.h:0;
    var dayLow=snap&&snap.day?snap.day.l:0;
    var volume=snap&&snap.day?snap.day.v:0;
    var vwap=snap&&snap.day?snap.day.vw:0;
    var prevClose=snap&&snap.prevDay?snap.prevDay.c:0;
    var prevVol=snap&&snap.prevDay?snap.prevDay.v:0;
    var change=snap?snap.todaysChangePerc:0;
    
    // Volume analysis
    var avgVol=0;
    if(bars.length>=50){
      var last50=bars.slice(-50);
      last50.forEach(function(b){avgVol+=b.v;});
      avgVol=avgVol/50;
    }
    var volRatio=avgVol>0?Math.round((volume/avgVol)*100):0;
    
    // Distance from 50 EMA in ADR multiples
    var distFromEMA50=ema50>0?Math.abs(price-ema50):0;
    var adrMultiple=adr>0?(distFromEMA50/adr):0;
    var extended=adrMultiple>4;
    
    // Trend Template
    var tt1=price>sma50;
    var tt2=price>sma200;
    var tt3=sma50>sma200;
    var tt4=yearLow>0&&price>(yearLow*1.25);
    var tt5=yearHigh>0&&price>(yearHigh*0.75);
    var ttCount=(tt1?1:0)+(tt2?1:0)+(tt3?1:0)+(tt4?1:0)+(tt5?1:0);
    var ttPass=ttCount===5;
    
    // Gap detection
    var gapUp=prevClose>0?((dayOpen-prevClose)/prevClose)*100:0;
    var isGap=Math.abs(gapUp)>3;
    
    // Market data (SPY, QQQ, ETF)
    analysis.live={
      price:price,dayOpen:dayOpen,dayHigh:dayHigh,dayLow:dayLow,
      change:change,volume:volume,avgVol:avgVol,volRatio:volRatio,
      vwap:vwap,prevClose:prevClose,
      ma50:sma50,ma200:sma200,ema20:ema20,ema50:ema50,
      yearHigh:yearHigh,yearLow:yearLow,
      adr:adr,adrMultiple:adrMultiple,extended:extended,
      ttPass:ttPass,ttCount:ttCount,
      tt_above150:tt1,tt_above200:tt2,tt_150above200:tt3,tt_25aboveLow:tt4,tt_within25high:tt5,
      gapUp:gapUp,isGap:isGap,
      companyName:details.name||ticker,
      description:details.description||(COMPANY_DESC[ticker]||""),
      fmpSector:details.sic_description||details.sector||"",
      fmpIndustry:details.type||details.industry||"",
      mktCap:details.market_cap||0,
      employees:details.total_employees||0,
      homepage:details.homepage_url||"",
      // Market benchmarks
      spy:spySnap?{price:spySnap.day.c,change:spySnap.todaysChangePerc,vwap:spySnap.day.vw}:null,
      qqq:qqqSnap?{price:qqqSnap.day.c,change:qqqSnap.todaysChangePerc,vwap:qqqSnap.day.vw}:null,
      etf:etfSnap?{ticker:sectorETF,price:etfSnap.day.c,change:etfSnap.todaysChangePerc,vwap:etfSnap.day.vw}:null,
      etfTicker:sectorETF,
      // Bars for chart/pattern analysis
      bars:bars,
      // News
      news:news.slice(0,5),
      epsData:[]
    };
    
    // ── Parse financialdatasets.ai response ──────────────────────────────────
    var quarters=[];
    var histArr=Array.isArray(fdHistory)?fdHistory:[];
    var monthNames=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    function fmtPeriod(dateStr){
      if(!dateStr)return"";
      var p=dateStr.split("-");
      return p.length>=2?(monthNames[parseInt(p[1])]||"")+"-"+p[0].slice(2):"";
    }

    // Build quarters from history (newest first from FD)
    histArr.forEach(function(e){
      var dateStr=e.report_period||"";
      quarters.push({
        period:fmtPeriod(dateStr),
        endDate:dateStr,
        eps:e.earnings_per_share_diluted||e.earnings_per_share||0,
        rev:e.revenue||0,
        netIncome:e.net_income||0,
        grossProfit:e.gross_profit||0,
        epsChg:null,revChg:null,
        epsSurprise:null,revSurprise:null,
        epsEstimate:null,revEstimate:null
      });
    });

    // Overlay latest quarter data from /earnings (has estimates + BEAT/MISS)
    if(fdLatest&&fdLatest.quarterly){
      var lq=fdLatest.quarterly;
      var lDate=fdLatest.report_period||"";
      var latestSurpEps=null,latestSurpRev=null;
      if(lq.estimated_earnings_per_share&&lq.earnings_per_share!==null){
        latestSurpEps=((lq.earnings_per_share-lq.estimated_earnings_per_share)/Math.abs(lq.estimated_earnings_per_share))*100;
      }
      if(lq.estimated_revenue&&lq.revenue){
        latestSurpRev=((lq.revenue-lq.estimated_revenue)/Math.abs(lq.estimated_revenue))*100;
      }
      // Inject or update first quarter entry
      if(quarters.length>0&&quarters[0].endDate===lDate){
        quarters[0].epsSurprise=latestSurpEps;
        quarters[0].revSurprise=latestSurpRev;
        quarters[0].epsEstimate=lq.estimated_earnings_per_share||null;
        quarters[0].revEstimate=lq.estimated_revenue||null;
        quarters[0].beatMissEps=lq.eps_surprise||null;
        quarters[0].beatMissRev=lq.revenue_surprise||null;
      } else if(quarters.length===0){
        // No history data, use latest snapshot only
        quarters.push({
          period:fmtPeriod(lDate),endDate:lDate,
          eps:lq.earnings_per_share||0,rev:lq.revenue||0,
          netIncome:lq.net_income||0,grossProfit:lq.gross_profit||0,
          epsChg:null,revChg:null,
          epsSurprise:latestSurpEps,revSurprise:latestSurpRev,
          epsEstimate:lq.estimated_earnings_per_share||null,
          revEstimate:lq.estimated_revenue||null,
          beatMissEps:lq.eps_surprise||null,beatMissRev:lq.revenue_surprise||null
        });
      }
    }

    // Calculate YoY changes (compare Q to same Q last year = 4 back)
    quarters.forEach(function(q,i){
      if(i+4<quarters.length){
        var prev=quarters[i+4];
        if(prev.eps&&prev.eps!==0)q.epsChg=((q.eps-prev.eps)/Math.abs(prev.eps))*100;
        if(prev.rev&&prev.rev!==0)q.revChg=((q.rev-prev.rev)/Math.abs(prev.rev))*100;
      }
    });
    
    // Store in live data
    analysis.live.quarters=quarters;
    analysis.live.epsData=quarters.slice(0,4).map(function(q){
      return {period:q.period,eps:q.eps,rev:q.rev,epsChg:q.epsChg,revChg:q.revChg};
    });
    
    // Determine earnings trend
    if(quarters.length>=2){
      var recentEps=quarters[0].epsChg;
      var prevEps=quarters[1].epsChg;
      if(recentEps!==null&&recentEps>25)analysis.earnings.eps_growth="+"+recentEps.toFixed(0)+"%";
      else if(recentEps!==null&&recentEps>0)analysis.earnings.eps_growth="+"+recentEps.toFixed(0)+"%";
      else if(recentEps!==null)analysis.earnings.eps_growth=recentEps.toFixed(0)+"%";
      
      if(recentEps!==null&&prevEps!==null){
        if(recentEps>prevEps&&recentEps>0)analysis.earnings.revenue_trend="Accelerating";
        else if(recentEps>0)analysis.earnings.revenue_trend="Growing";
        else analysis.earnings.revenue_trend="Decelerating";
      }
    }

    // Earnings from bars (detect gap ups)
    var earningsGaps=[];
    for(var i=1;i<bars.length;i++){
      var gp=((bars[i].o-bars[i-1].c)/bars[i-1].c)*100;
      if(Math.abs(gp)>5){
        earningsGaps.push({date:new Date(bars[i].t).toLocaleDateString(),gap:gp.toFixed(1)+"%",vol:bars[i].v});
      }
    }
    analysis.live.earningsGaps=earningsGaps;
    
    // Catalysts from news
    if(news.length){
      analysis.catalysts.narrative=news[0].title||"";
      analysis.catalysts.recent=news.slice(0,3).map(function(n){return n.title||"";});
    }else{
      analysis.catalysts.narrative="No recent news found.";
      analysis.catalysts.recent=[];
    }
    
    // Risk assessment
    var riskFactors=[];
    if(!tt1)riskFactors.push("Below 50 SMA \u2014 short-term trend broken");
    if(!tt2)riskFactors.push("Below 200 SMA \u2014 major trend broken");
    if(extended)riskFactors.push("Extended "+adrMultiple.toFixed(1)+"x ADR above 50 EMA \u2014 DO NOT chase");
    if(volRatio<70)riskFactors.push("Volume below average ("+volRatio+"%) \u2014 low conviction move");
    if(yearHigh>0&&price<yearHigh*0.75)riskFactors.push("More than 25% off 52W high \u2014 damaged chart");
    if(analysis.market_context.sector_strength==="Weak")riskFactors.push("Sector is weak \u2014 swimming against the tide");
    if(gapUp<-5)riskFactors.push("Gapped down "+gapUp.toFixed(1)+"% today \u2014 potential distribution");
    analysis.risk.factors=riskFactors;
    analysis.risk.level=riskFactors.length>=3?"High":riskFactors.length>=1?"Medium":"Low";
    
    // Setup score
    var points=0;
    if(ttPass)points+=3;else if(ttCount>=3)points+=1;
    if(rs>=90)points+=3;else if(rs>=80)points+=2;else if(rs>=60)points+=1;
    if(analysis.market_context.sector_strength==="Strong")points+=2;else if(analysis.market_context.sector_strength==="Neutral")points+=1;
    if(volRatio>150&&change>0)points+=2;else if(volRatio>100)points+=1;
    if(!extended)points+=1;
    if(riskFactors.length===0)points+=2;else if(riskFactors.length<=1)points+=1;
    
    var scoreMap=[["A",12],["B",9],["C",6],["D",3],["F",0]];
    var scoreGrade="F";
    for(var i=0;i<scoreMap.length;i++){if(points>=scoreMap[i][1]){scoreGrade=scoreMap[i][0];break;}}
    
    analysis.setup.score=scoreGrade;
    analysis.setup.summary=
      scoreGrade==="A"?"Strong setup. Trend confirmed, sector hot, RS leading. Look for entry on pullback to 20 EMA or VCP breakout.":
      scoreGrade==="B"?"Good potential. Most criteria met. Watch for volume confirmation and tighter base formation.":
      scoreGrade==="C"?"Mixed signals. Some positives but key criteria missing. Add to watchlist, wait for improvement.":
      scoreGrade==="D"?"Weak setup. Multiple issues. Not actionable right now. Monitor for trend change.":
      "Avoid. Broken trend, weak RS, high risk. Look elsewhere.";
    analysis.setup.action=
      scoreGrade==="A"?(extended?"Setup is A-grade but EXTENDED ("+adrMultiple.toFixed(1)+"x ADR). Wait for pullback to 20 EMA ($"+ema20.toFixed(2)+") before entering.":"Watch for breakout above $"+dayHigh.toFixed(2)+" on volume >"+Math.round(avgVol*1.5).toLocaleString()+". Stop below 50 SMA at $"+sma50.toFixed(2)+"."):
      scoreGrade==="B"?"Add to active watchlist. Need "+(ttPass?"volume surge":"trend template pass")+" to upgrade to A.":
      scoreGrade==="C"?"Monitor weekly. Key missing: "+(ttPass?"RS improvement and sector rotation":"Trend Template \u2014 wait for price to reclaim MAs")+".":
      "No action. Not a buy candidate. Check back after earnings or major catalyst.";
    
    // Re-render with full data
    _analysisCache[ticker]=analysis;_analysisCache[ticker]._relatedStr=relatedStr;
    renderAnalysis(ticker,grade,info,rs,analysis,relatedStr);
    
  }).catch(function(err){

    analysis.setup.summary="Error loading live data: "+err.message;
    renderAnalysis(ticker,grade,info,rs,analysis,relatedStr);
  });
}

// ── THEME RS CALCULATOR (uses rs_scores from last scan) ─────────────────────
function calcThemeRS(theme){
  try{
    var rs=JSON.parse(localStorage.getItem("rs_scores")||"{}");
    var scores=[];
    Object.values(data).forEach(function(arr){
      arr.forEach(function(t){
        if(TI[t]&&TI[t][0]===theme&&rs[t]&&rs[t].pct){
          scores.push(rs[t].pct);
        }
      });
    });
    if(!scores.length)return null;
    var avg=scores.reduce(function(a,b){return a+b;},0)/scores.length;
    return{avg:Math.round(avg),count:scores.length,scores:scores.sort(function(a,b){return b-a;})};
  }catch(e){return null;}
}

  var themeMed=themeRS&&themeRS>=60&&themeRS<80;

  var epScore=0;

  // --- Revenue acceleration (25pts) ---

    if(q.epsChg!==null&&q.epsChg!==undefined)epsQ.push(q.epsChg);
  });
  var revAccel=revQ.length>=2&&revQ[0]>revQ[1];
  var revGrowth=revQ.length>0&&revQ[0]>15;

  // --- EPS trend improving (15pts) ---

  var epsGrowing=epsQ.length>0&&epsQ[0]>20;
  var epsPts=epsImproving&&epsGrowing?15:epsImproving?10:epsGrowing?8:0;
  // Also count near-zero improvement (path to profitability)
  if(!epsPts&&quarters.length>=2){
    var last=quarters[0].eps,prev=quarters[1].eps;
    if(last<0&&prev<0&&last>prev)epsPts=8; // losses shrinking
    if(last>=0&&prev<0)epsPts=12; // crossed to profitable

  epScore+=epsPts;

  // --- Surprise % (20pts) ---

  surprisePts=Math.max(0,Math.min(20,surprisePts));

function buildEarningsTable(quarters,estimates){
  if(!quarters||quarters.length===0)return'<div style="color:#555;font-size:8px;padding:8px">No data</div>';
  var maxRev=0; quarters.forEach(function(q){if(q.rev&&q.rev>maxRev)maxRev=q.rev;});
  var inBil=maxRev>=10e9, sDiv=inBil?1e9:1e6, sHdr=inBil?"Sales($Bil)":"Sales($Mil)";

  function fPct(v){
    if(v===null||v===undefined||isNaN(v))return{t:"—",c:"#888"};
    var c=Math.max(-999,Math.min(999,Math.round(v)));
    var t=c>0?"+"+c+"%":c+"%";
    // TradingView: blue for positive, red for negative
    return{t:t,c:c>0?"#1565c0":c<0?"#c62828":"#000"};
  }
  function fSurp(v){
    if(v===null||v===undefined||isNaN(v))return{t:"—",c:"#888"};
    var c=Math.max(-999,Math.min(999,Math.round(v)));
    var t=c>0?"+"+c+"%":c+"%";
    // TradingView: green positive, red negative
    return{t:t,c:c>0?"#2e7d32":c<0?"#c62828":"#000"};
  }
  function fSales(v){
    if(!v||isNaN(v))return"N/A";
    var n=v/sDiv; return n>=100?n.toFixed(0):n.toFixed(1);
  }

  var th='padding:2px 3px;font-size:7.5px;font-weight:700;background:#fff;color:#000;border:1px solid #000;text-align:right';
  var thL=th+';text-align:left';
  var h='<table style="width:100%;border-collapse:collapse;font-size:8px">';
  h+='<thead><tr>';
  h+='<th style="'+thL+'">Quarterly</th>';
  h+='<th style="'+th+'">EPS($)</th>';
  h+='<th style="'+th+'">%Chg</th>';
  h+='<th style="'+th+'">%Surp</th>';
  h+='<th style="'+th+'">'+sHdr+'</th>';
  h+='<th style="'+th+'">%Chg</th>';
  h+='<th style="'+th+'">%Surp</th>';
  h+='</tr></thead><tbody>';

  // Calculate missing YoY %Chg from raw data (fallback if AI didn't compute it)
  for(var qi=0;qi<quarters.length;qi++){
    var q4=quarters[qi+4]; // same quarter prior year
    if(q4){
      if((quarters[qi].epsChg===null||quarters[qi].epsChg===undefined)&&quarters[qi].eps!==null&&q4.eps!==null&&q4.eps!==0){
        quarters[qi].epsChg=Math.round((quarters[qi].eps-q4.eps)/Math.abs(q4.eps)*100);
      }
      if((quarters[qi].revChg===null||quarters[qi].revChg===undefined)&&quarters[qi].rev&&q4.rev&&q4.rev!==0){
        quarters[qi].revChg=Math.round((quarters[qi].rev-q4.rev)/Math.abs(q4.rev)*100);
      }
    }
  }
  var dispQ=quarters.slice(0,8).reverse();
  dispQ.forEach(function(q,i){
    var isLatest=(i===dispQ.length-1);
    var bg=isLatest?(i%2===0?"#ffffff":"#e5eaf3"):(i%2===0?"#ffffff":"#e5eaf3");
    var tc="#000";
    var bd=isLatest?'2px solid #f5a623':'1px solid #b0b8c8';
    var ep=q.eps!==undefined&&q.eps!==null?q.eps.toFixed(2):"N/A";
    var epCol=q.eps>=0?"#000":"#c62828";
    var ec=fPct(q.epsChg), es=fSurp(q.epsSurprise);
    var rc=fPct(q.revChg), rs=fSurp(q.revSurprise);
    var sv=fSales(q.rev);
    // BEAT/MISS badge
    var badge="";
    if(isLatest&&q.beatMissEps){
      var bc=q.beatMissEps==="BEAT"?"#00c853":q.beatMissEps==="MISS"?"#f44336":"#fdd835";
      badge=' <span style="font-size:6px;padding:1px 3px;background:'+bc+';color:#000;border-radius:2px;font-weight:800">'+q.beatMissEps+'</span>';
    }
    var tag=isLatest?' <span style="font-size:5px;color:#fdd835;font-weight:700">LATEST</span>'+badge:"";
    h+='<tr>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+tc+';white-space:nowrap;font-weight:'+(isLatest?"700":"400")+'">'+q.period+tag+'</td>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+epCol+';text-align:right">'+ep+'</td>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+ec.c+';text-align:right">'+ec.t+'</td>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+es.c+';text-align:right">'+es.t+'</td>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+tc+';text-align:right">'+sv+'</td>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+rc.c+';text-align:right">'+rc.t+'</td>';
    h+='<td style="padding:3px 4px;background:'+bg+';border:'+bd+';color:'+rs.c+';text-align:right">'+rs.t+'</td>';
    h+='</tr>';
  });
  // Estimate rows from AI
  var allEsts=estimates&&estimates.length?estimates:(quarters[0]&&quarters[0].epsEstimate?[{period:"Next est",eps:quarters[0].epsEstimate,rev:quarters[0].revEstimate,epsChg:null,revChg:null,isEstimate:true}]:[]);
  allEsts.forEach(function(e){
    var eec=fPct(e.epsChg), erc=fPct(e.revChg);

    h+='<td style="padding:3px 4px;background:#f0f0f8;border:'+estBd+';color:'+(eec.t==="—"?"#3949ab":eec.c)+';text-align:right">'+eec.t+'</td>';
    h+='<td style="padding:3px 4px;background:#f0f0f8;border:'+estBd+';color:#999;text-align:right">—</td>';
    h+='<td style="padding:3px 4px;background:#f0f0f8;border:'+estBd+';color:#3949ab;text-align:right">'+(e.rev?fSales(e.rev):"—")+'</td>';
    h+='<td style="padding:3px 4px;background:#f0f0f8;border:'+estBd+';color:'+(erc.t==="—"?"#3949ab":erc.c)+';text-align:right">'+erc.t+'</td>';
    h+='<td style="padding:3px 4px;background:#f0f0f8;border:'+estBd+';color:#999;text-align:right">—</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';

  // Earnings quality rating A+ to F
  if(quarters.length>=2){
    var rating=calcEarningsRating(quarters);
    h+='<div style="margin-top:4px;display:flex;align-items:center;gap:6px">';
    h+='<span style="font-size:7px;color:#888;letter-spacing:.5px">EARNINGS RATING</span>';
    h+='<span style="font-size:13px;font-weight:900;color:'+rating.c+'">'+rating.grade+'</span>';
    h+='<span style="font-size:7px;color:#666">'+rating.reason+'</span>';
    h+='</div>';
  }
  return h;
}

function calcEarningsRating(q){
  if(!q||q.length<2)return{grade:"N/A",c:"#888",reason:"insufficient data"};
  var score=0, notes=[];
  // EPS trend: last 2 quarters improving YoY
  var e0=q[0]?q[0].epsChg:null, e1=q[1]?q[1].epsChg:null;
  if(e0!==null&&e0>25){score+=25;notes.push("EPS +"+Math.round(e0)+"%");}
  else if(e0!==null&&e0>0){score+=10;}
  // Acceleration: e0 > e1
  if(e0!==null&&e1!==null&&e0>e1){score+=20;notes.push("accel");}
  // Revenue growth
  var r0=q[0]?q[0].revChg:null, r1=q[1]?q[1].revChg:null;
  if(r0!==null&&r0>25){score+=20;notes.push("Rev +"+Math.round(r0)+"%");}
  else if(r0!==null&&r0>10){score+=10;}
  // Rev accel
  if(r0!==null&&r1!==null&&r0>r1){score+=10;notes.push("rev accel");}
  // Beat estimates
  var surp=q[0]?q[0].epsSurprise:null;
  if(surp!==null&&surp>10){score+=15;notes.push("beat +"+Math.round(surp)+"%");}
  else if(surp!==null&&surp>0){score+=7;}
  // 3 consecutive quarters positive EPS chg
  var consec=0;
  for(var i=0;i<Math.min(3,q.length);i++){if(q[i].epsChg>0)consec++;}
  if(consec>=3){score+=10;notes.push("3Q streak");}

  var grade,c;
  if(score>=85){grade="A+";c="#00c853";}
  else if(score>=70){grade="A";c="#00c853";}
  else if(score>=55){grade="B+";c="#7cb342";}
  else if(score>=40){grade="B";c="#c6d430";}
  else if(score>=28){grade="C";c="#fdd835";}
  else if(score>=15){grade="D";c="#ff9800";}
  else{grade="F";c="#f44336";}
  return{grade:grade,c:c,reason:notes.slice(0,3).join(" · ")||"weak fundamentals"};
}

}

            quarters[i].epsChg=Math.round((quarters[i].eps-p.eps)/Math.abs(p.eps)*100);
          if(quarters[i].rev&&p.rev&&p.rev!==0)
            quarters[i].revChg=Math.round((quarters[i].rev-p.rev)/Math.abs(p.rev)*100);
        }
        renderTable(quarters,[]);
      }).catch(function(){renderTable(quarters.slice(0,10),[]);});
    }).catch(function(){trySEC();});
  }

  // ── PATH 3: SEC EDGAR XBRL (free, no key) ────────────────────────────
  function trySEC(){
    tbl.innerHTML='<div style="color:#666;font-size:8px;padding:8px;text-align:center">📂 Loading from SEC EDGAR...</div>';
    var proxy="https://corsproxy.io/?url=";
    fetch(proxy+encodeURIComponent("https://www.sec.gov/files/company_tickers.json"))
    .then(function(r){if(!r.ok)throw new Error("API "+r.status+(r.status===401?" (invalid key)":r.status===429?" (rate limited)":""));return r.json();})
    .then(function(tickers){
      var cik=null,tkU=ticker.toUpperCase();
      var keys=Object.keys(tickers);
      for(var i=0;i<keys.length;i++){
        if(tickers[keys[i]].ticker===tkU){cik=String(tickers[keys[i]].cik_str).padStart(10,"0");break;}
      }
      if(!cik)throw new Error("Not in SEC");
      return fetch(proxy+encodeURIComponent("https://data.sec.gov/api/xbrl/companyfacts/CIK"+cik+".json"));
    }).then(function(r){if(!r.ok)throw new Error("API "+r.status+(r.status===401?" (invalid key)":r.status===429?" (rate limited)":""));return r.json();})
    .then(function(facts){
      var us=facts.facts["us-gaap"]||{};
      var epsArr=[];
      ["EarningsPerShareDiluted","EarningsPerShareBasic"].forEach(function(c){
        if(epsArr.length>3)return;
        var u=(us[c]||{}).units||{};
        var a=(u["USD/shares"]||u["shares"]||[]).filter(function(d){
          var days=(new Date(d.end)-new Date(d.start||d.end))/86400000;
          return d.form==="10-Q"&&days>60&&days<110;
        });
        if(a.length>3)epsArr=a;
      });
      var revArr=[];
      ["Revenues","RevenueFromContractWithCustomerExcludingAssessedTax","SalesRevenueNet","NetRevenues"].forEach(function(c){
        if(revArr.length>3)return;
        var a=((us[c]||{}).units||{})["USD"]||[];
        a=a.filter(function(d){
          var days=(new Date(d.end)-new Date(d.start||d.end))/86400000;
          return d.form==="10-Q"&&days>60&&days<110;
        });
        if(a.length>3)revArr=a;
      });
      var qMap={};
      epsArr.forEach(function(d){var k=d.end;if(!qMap[k])qMap[k]={period:d.end,eps:null,rev:null,epsChg:null,revChg:null,epsSurprise:null,revSurprise:null};qMap[k].eps=d.val;});
      revArr.forEach(function(d){var k=d.end;if(!qMap[k])qMap[k]={period:d.end,eps:null,rev:null,epsChg:null,revChg:null,epsSurprise:null,revSurprise:null};qMap[k].rev=d.val;});
      var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      var quarters=Object.values(qMap).filter(function(q){return q.eps!==null||q.rev!==null;})
        .sort(function(a,b){return new Date(b.period)-new Date(a.period);}).slice(0,12);
      if(quarters.length<2)throw new Error("Insufficient data");
      quarters.forEach(function(q){var dt=new Date(q.period);q.period=MON[dt.getMonth()]+"-"+String(dt.getFullYear()).slice(2);});
      for(var i=0;i<quarters.length;i++){
        var p=quarters[i+4];if(!p)continue;
        if(quarters[i].eps!==null&&p.eps!==null&&p.eps!==0)quarters[i].epsChg=Math.round((quarters[i].eps-p.eps)/Math.abs(p.eps)*100);
        if(quarters[i].rev&&p.rev&&p.rev!==0)quarters[i].revChg=Math.round((quarters[i].rev-p.rev)/Math.abs(p.rev)*100);
      }
      renderTable(quarters,[]);
    }).catch(function(e){
      showError("No free data — click Load via AI button.");
    });
  }

  // ── PATH 4: Claude AI Haiku + web search (last resort) ───────────────
  function tryAI(){
    tbl.innerHTML='<div style="color:#666;font-size:8px;padding:8px;text-align:center">🤖 Fetching via AI...</div>';
    var prompt="Fetch https://stockanalysis.com/stocks/"+ticker.toLowerCase()+"/financials/?p=quarterly and return "+ticker+" quarterly earnings as a JSON object. Format: {\"history\":[{\"period\":\"Dec-25\",\"eps\":-0.01,\"epsChg\":50,\"epsSurprise\":91,\"rev\":134000000,\"revChg\":34,\"revSurprise\":2}],\"estimates\":[{\"period\":\"Mar-26\",\"eps\":-0.05,\"rev\":158000000,\"epsChg\":20,\"revChg\":10}]}. Return 8 quarters newest first. epsChg and revChg are YoY % integers. rev is raw dollars. Start response with { character.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":antkey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1200,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:prompt}]
      })
    }).then(function(r){if(!r.ok)throw new Error("API "+r.status+(r.status===401?" (invalid key)":r.status===429?" (rate limited)":""));return r.json();}).then(function(data){
      if(data.error){showError("AI: "+data.error.message);return;}
      var txt="";

      var clean=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      var om=clean.match(/\{[\s\S]*\}/),am=clean.match(/\[[\s\S]*\]/);
      var aiQ=null,aiEst=[];
      try{
        if(om){var p=JSON.parse(om[0]);aiQ=Array.isArray(p)?p:(p.history||p);aiEst=p.estimates||[];}
        else if(am){aiQ=JSON.parse(am[0]);}
      }catch(e){showError("AI parse error — try again");return;}
      if(!aiQ||!aiQ.length){showError("AI returned no data — try again");return;}
      renderTable(aiQ,aiEst);
    }).catch(function(e){showError("AI error: "+e.message);});

  // Start cascade — Polygon first (already have key, free, reliable)
  tryPolygon();

function renderQullaTab(t,grade,info,rs,live,earn,mkt,conn){
  var h="";
  h+='<div class="ap-s"><div class="ap-sh">🚀 Qullamaggie — Episodic Pivot</div>';
  h+='<div class="ap-t" style="margin-bottom:8px;color:#aaa">Qullamaggie trades stocks that gap up on a major catalyst (earnings, FDA, news), build a tight base, then break out again. The EP is the <b>first big move</b>. The base-breakout is the <b>trade</b>.</div>';

  var themeStrong=mkt.sector_strength==="Strong";
  var rsHigh=rs>=80;
  var ttPass=live.ttPass||false;
  var volHigh=live.volRatio&&live.volRatio>150;
  var notExtended=!live.extended;

  // Core EP checklist
  function chkQ(pass,warn,title,detail){
    var icon=pass?"✅":warn?"⚠️":"❌";
    var cls=pass?"pass":warn?"warn":"fail";
    return '<div class="ap-check '+cls+'"><span class="icon">'+icon+'</span><span class="txt"><div><b>'+title+'</b></div><div style="font-size:8px;color:#888">'+detail+'</div></span></div>';
  }

  h+=chkQ(themeStrong,mkt.sector_strength==="Neutral","Hot Sector / Theme In Play",info[0]+": "+(mkt.sector_strength||"?")+(mkt.rotation_note?" — "+mkt.rotation_note:""));
  h+=chkQ(ttPass,live.ttCount>=3,"Uptrend Confirmed (Trend Template)","TT: "+(ttPass?"PASS":"FAIL")+" "+live.ttCount+"/5"+(live.extended?" | ⚠️ EXTENDED "+live.adrMultiple.toFixed(1)+"x ADR":""));
  h+=chkQ(notExtended,live.adrMultiple&&live.adrMultiple<6,"Not Extended — In Buy Zone",live.adrMultiple?live.adrMultiple.toFixed(1)+"x ADR above 50 EMA"+(live.extended?" — WAIT FOR PULLBACK TO 20 EMA":""):"No data");
  h+=chkQ(volHigh,live.volRatio&&live.volRatio>100,"Volume Confirming Move",live.volRatio?"Today: "+live.volRatio+"% of 50d avg":"No data");

  var qTotal=(rsHigh?1:0)+(themeStrong?1:0)+(ttPass?1:0)+(notExtended?1:0)+(volHigh?1:0);
  h+='<div class="ap-verdict '+(qTotal>=4?"buy":qTotal>=2?"wait":"avoid")+'" style="margin-top:10px">';
  h+='<b>'+qTotal+'/5 signals confirmed.</b> '+(qTotal>=4?"Setup is forming — watch for EP gap + tight base breakout.":qTotal>=3?"Partial setup. Chart must show the episodic move + consolidation.":"Not a Qullamaggie setup right now.")+'</div>';
  h+='</div>';

  // EP Playbook
  h+='<div class="ap-s"><div class="ap-sh">📖 EP Playbook</div>';
  h+='<div style="display:flex;flex-direction:column;gap:3px">';
  var steps=[
    ["1","Catalyst","Earnings beat, FDA approval, major contract, short squeeze trigger — something that changes the story"],
    ["2","Gap Up","Stock gaps 15%+ on 3-5x volume. This is the EP. Qullamaggie buys breakouts, not chases"],
    ["3","Base","Stock consolidates 3–15 days in a tight range. Volume dries up. This is where you stalk it"],
    ["4","Breakout","Price breaks above the EP high on volume surge (50%+ above avg). This is the entry"],
    ["5","Add","If stock holds above entry and breaks another level, add to winner. Size up into strength"]
  ];
  steps.forEach(function(s){
    h+='<div style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid #1a1a1a">';
    h+='<div style="min-width:18px;height:18px;background:#fdd835;color:#000;border-radius:50%;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:1px">'+s[0]+'</div>';
    h+='<div><div style="font-size:9px;font-weight:700;color:#fff">'+s[1]+'</div><div style="font-size:8px;color:#888;line-height:1.4">'+s[2]+'</div></div></div>';
  });
  h+='</div></div>';

  // Leader in theme
  h+='<div class="ap-s"><div class="ap-sh">🏆 Leader vs Laggard</div>';
  h+='<div class="ap-t" style="color:#aaa;margin-bottom:6px">Qullamaggie always buys the <b>highest RS stock</b> in the hot theme. If 5 photonics stocks are moving, he buys the one with RS 99, not 85.</div>';
  if(conn.leaders&&conn.leaders.length){
    var rsMap={};try{rsMap=JSON.parse(localStorage.getItem("rs_scores")||"{}");}catch(e){}
    var allPeers=[t].concat(conn.leaders).concat(conn.sympathy||[]).filter(function(v,i,a){return a.indexOf(v)===i;});
    allPeers.sort(function(a,b){return((rsMap[b]&&rsMap[b].pct)||0)-((rsMap[a]&&rsMap[a].pct)||0);});

function renderRiskTab(t,live,risk,sc){
  var h="";

  var ACCT=200000, MAX_LOSS=12000, DAY_LOSS=8000;
  // Per-trade risk: keep it to 5-10% of daily limit so you have multiple attempts
  var SAFE_TRADE=DAY_LOSS*0.05;    // $400 — very conservative, 20 losses before daily out
  var STD_TRADE=DAY_LOSS*0.10;     // $800 — standard, 10 losses before daily out  
  var MAX_TRADE=DAY_LOSS*0.15;     // $1200 — aggressive, still 6+ attempts
  // Stop = low of day (dayLow), fallback to 50SMA then 7%
  var stopPrice=live.dayLow&&live.dayLow>0&&live.price&&live.dayLow<live.price?live.dayLow:(live.ma50&&live.ma50<live.price?live.ma50:live.price*0.93);
  var price=live.price||0;
  var riskPerShare=price>0&&stopPrice<price?price-stopPrice:0;
  // Max shares from per-trade risk (limit single trade to 4% of account = $8k, matching daily loss limit)
  var maxRiskPerTrade=DAY_LOSS*0.10; // standard: 10% of daily limit per trade
  var shares=riskPerShare>0?Math.floor(maxRiskPerTrade/riskPerShare):0;
  var posDol=shares*price;
  var pctAcct=ACCT>0?(posDol/ACCT*100):0;
  var riskDol=shares*riskPerShare;

  // How many losing trades before daily limit hit?
  var tradesBeforeDay=riskPerShare>0?Math.floor(DAY_LOSS/riskDol*riskDol/riskDol):"-"; // simplified: 1 full-loss trade

  var tradesBeforeAcct=riskDol>0?Math.floor(MAX_LOSS/riskDol):0;

  h+='<span style="color:#fdd835">Standard</span> $'+STD_TRADE.toFixed(0)+'/trade &nbsp;→&nbsp; '+Math.floor(DAY_LOSS/STD_TRADE)+' losses before daily out, '+Math.floor(MAX_LOSS/STD_TRADE)+' before account blown<br>';

// Position size calculator
window.calcPos=function(){
  var ACCT=200000,DAY_LOSS=8000;
  var stop=parseFloat(document.getElementById("ps-stop").value)||0;
  var d=window._apData;if(!d||!d.a||!d.a.live)return;
  var price=d.a.live.price||0;
  if(!price||!stop||stop>=price)return;
  var riskPerShare=price-stop;
  var shares=Math.floor(DAY_LOSS/riskPerShare);
  var posDol=shares*price;
  var pctAcct=(posDol/ACCT*100).toFixed(1);
  var riskDol=shares*riskPerShare;
  var res=document.getElementById("ps-result");
  if(res)res.innerHTML='<div style="margin-top:6px;padding:6px 8px;background:#1a1a1a;border-radius:4px"><b style="color:#fdd835">'+shares.toLocaleString()+' shares</b> @ $'+price.toFixed(2)+' = <b>$'+posDol.toLocaleString(undefined,{maximumFractionDigits:0})+'</b> ('+pctAcct+'% of account) &nbsp;·&nbsp; <span style="color:#f44336">Risk $'+riskDol.toLocaleString(undefined,{maximumFractionDigits:0})+'</span> &nbsp;·&nbsp; Stop $'+stop.toFixed(2)+'</div>';
};

// SMA from bars
function calcSMA(bars,period){
  if(!bars||bars.length<period)return 0;
  var slice=bars.slice(-period);
  var sum=0;slice.forEach(function(b){sum+=b.c;});
  return sum/period;
}

// EMA from bars
function calcEMA(bars,period){
  if(!bars||bars.length<period)return 0;
  var k=2/(period+1);
  var ema=bars[0].c;
  for(var i=1;i<bars.length;i++){
    ema=bars[i].c*k+ema*(1-k);
  }
  return ema;
}

// ADR (Average Daily Range) from bars
function calcADR(bars,period){
  if(!bars||bars.length<period)return 0;
  var slice=bars.slice(-period);
  var sum=0;slice.forEach(function(b){sum+=(b.h-b.l);});
  return sum/period;
}

    }

    if(status)status.textContent="Step 3/3: Ranking "+resp.tickers.length+" tickers...";

    // ── BUILD FULL-UNIVERSE COMPOSITE SCORES ──────────────────────────────
    // Score EVERY ticker in the snapshot (not just our grid)
    // This is the IBD approach: rank against the full market, extract percentile
    var universeScores=[];
    resp.tickers.forEach(function(s){
      if(!s.ticker||!s.day||!s.day.c)return;
      var price=s.day.c;
      if(price<10)return; // IBD excludes sub-$10 stocks
      if(!s.day.v||s.day.v<400000)return; // IBD minimum ~400k daily volume
      var comp=calcComposite(s.ticker,price);
      if(comp===null)return; // no 12mo history
      universeScores.push({t:s.ticker,comp:comp,snap:s});
    });

    // Sort descending by composite (highest return = rank 1)
    universeScores.sort(function(a,b){return b.comp-a.comp;});

    // ── ASSIGN PERCENTILE (IBD method) ────────────────────────────────────
    // pct = floor(99 * nBelow / (total-1))  → gives 1..99 range
    // rank 1 of N → 99, last rank → 1
    var N=universeScores.length;
    var scoreMap={}; // ticker → {pct, comp, snap}
    universeScores.forEach(function(item,idx){
      var nBelow=N-1-idx; // how many stocks are below this one
      var pct=Math.max(1,Math.min(99,Math.floor(99*nBelow/Math.max(N-1,1))+1));
      item.pct=pct;
      scoreMap[item.t]=item;
    });

    // ── GRADE THRESHOLDS (calibrated to IBD 1-99 scale) ──────────────────
    function pctToGrade(pct){
      var t=[["A+",98],["A",95],["A-",90],["B+",85],["B",78],["B-",70],
             ["C+",62],["C",54],["C-",46],["D+",38],["D",30],["D-",24],
             ["E+",18],["E",14],["E-",10],["F+",7],["F",5],["F-",3],["G+",2],["G",0]];
      for(var i=0;i<t.length;i++){if(pct>=t[i][1])return t[i][0];}
      return"G";
    }

    // ── REGRADE OUR GRID ──────────────────────────────────────────────────
    var newData={};G.forEach(function(g){newData[g]=[];});
    var snapMap={};resp.tickers.forEach(function(s){snapMap[s.ticker]=s;});
    var rsScores={};
    var moves=0;
    var ranked=0;

    G.forEach(function(g){
      (data[g]||[]).forEach(function(t){
        var scored=scoreMap[t];
        if(scored){
          var newG=pctToGrade(scored.pct);
          newData[newG].push(t);
          var s=scored.snap;
          rsScores[t]={
            pct:scored.pct,
            comp:Math.round(scored.comp*10)/10,
            price:s.day?s.day.c:0,
            prevClose:s.prevDay?s.prevDay.c:0,
            change:s.todaysChangePerc||0,
            volume:s.day?s.day.v:0,
            vwap:s.day?s.day.vw:0
          };
          if(g!==newG)moves++;
          ranked++;
        }else{
          // No snapshot/history data — keep in current grade
          if(newData[g].indexOf(t)<0)newData[g].push(t);
        }
      });
    });

    localStorage.setItem("rs_scores",JSON.stringify(rsScores));
    localStorage.setItem("rs_scan_date",new Date().toISOString());
    data=newData;save();

    scanRunning=false;
    if(btn)btn.textContent="\u26A1 Scan RS";
    if(status)status.textContent="\u2705 "+ranked+" ranked vs "+N+" universe \u00B7 "+moves+" moved \u00B7 "+new Date().toLocaleTimeString();
    flash("\u26A1 RS Scan complete: "+ranked+" grid tickers ranked against "+N+"-stock universe. "+moves+" changed grade.");

    // ── DEBUG CONSOLE TOOLS ───────────────────────────────────────────────
    window._rsUniverse=universeScores;
    window._rsScoreMap=scoreMap;
    window.checkRS=function(ticker){
      var h=histPrices[ticker]||{};
      var sc=scoreMap[ticker];

      var price=s&&s.day?s.day.c:0;

      if(h.q1)out+=' | q1='+h.q1;
      if(h.q2)out+=' | q2='+h.q2;
      if(h.q3)out+=' | q3='+h.q3;
      if(h.q4)out+=' | q4='+h.q4;
      if(sc){
        var rank=universeScores.indexOf(sc)+1;
        out+=' | pct='+sc.pct+' rank='+rank+'/'+universeScores.length;
      }else{
        out+=' | NOT in universe';
      }
      console.info(out);
    };


    render();

  }).catch(function(err){

    scanRunning=false;
    if(btn)btn.textContent="\u26A1 Scan RS";
    if(status)status.textContent="\u274C Error: "+err.message;
  });
};

// RS ENGINE v2 — IBD-calibrated
// Calibrated against IBD MarketSurge 2150-stock universe (March 2026)
// RS 99 targets: WOLF, WDC, MU, CIEN, BE, AG, LITE, AAOI, BIOA, COGT etc.
// RS 1-5 targets: TTD, TEAM, HIMS, MNDY, DOCS, FLUT etc.
// ─────────────────────────────────────────────────────────────────────────────

var histPrices = {};

// Calculate the IBD-style weighted composite score for a single ticker
// Returns raw composite (NOT percentile) - percentile assigned after full ranking
function calcComposite(ticker, currentPrice) {
  var hist = histPrices[ticker] || {};
  if (!hist.pct1Y && !hist.pct3M) return null; // need FMP price-change data

  // FMP gives us direct % changes — use them directly
  var retQ1 = hist.pct3M || 0;                      // last 3 months
  var retQ2 = (hist.pct6M || 0) - (hist.pct3M || 0); // 3-6 months ago
  var retQ3 = ((hist.pct1Y || 0) - (hist.pct6M || 0)) * 0.5; // 6-9mo estimated
  var retQ4 = ((hist.pct1Y || 0) - (hist.pct6M || 0)) * 0.5; // 9-12mo estimated

  // IBD weighting: 40% Q1 (most recent) + 20% each of Q2, Q3, Q4
  var composite = (retQ1 * 2 + retQ2 + retQ3 + retQ4) / 5;

  return composite;
}

// Legacy wrapper used by analysis panel (returns cached percentile)
function calcSnapshotRS(s) {
  if (!s || !s.day) return 0;
  var ticker = s.ticker || '';
  try {
    var rs = JSON.parse(localStorage.getItem('rs_scores') || '{}');
    if (rs[ticker] && rs[ticker].pct) return rs[ticker].pct;
  } catch(e) {}
  return 0;
}

// Fetch 4 quarterly close prices using FMP stock-price-change (1Y/6M/3M/1M %)
// Much faster than Polygon grouped daily — single batch call per chunk
function fetchHistoricalPrices() {
  var status = document.getElementById('scanStatus');
  if (status) status.textContent = 'Loading RS history via FMP...';

  // Get all tickers from our grid
  var tickers = [];
  G.forEach(function(g){ (data[g]||[]).forEach(function(t){ tickers.push(t); }); });
  if (!tickers.length) return Promise.resolve();

  histPrices = {};
  var chunks = [];
  for (var i = 0; i < tickers.length; i += 200) chunks.push(tickers.slice(i, i+200));

  var done = 0;
  return new Promise(function(resolve) {
    chunks.forEach(function(chunk, ci) {
      setTimeout(function() {
        fmpFetch("/stock-price-change/"+chunk.join(","))
          .then(function(d) {
            var arr = Array.isArray(d) ? d : [];
            arr.forEach(function(q) {
              if (!q.symbol) return;
              var p1Y = q["1Y"] || 0;
              var p6M = q["6M"] || p1Y * 0.5;
              var p3M = q["3M"] || p1Y * 0.25;
              var p1M = q["1M"] || p3M * 0.33;
              // Convert % changes to price-anchor equivalents
              // We store as price ratios so calcComposite can use them
              var base = 100; // normalised base price
              histPrices[q.symbol] = {
                q1: base * (1 + p3M/100),          // price 3mo ago (current = base)
                q2: base * (1 + p6M/100) / (1 + p3M/100), // price 6mo anchor
                q3: base * (1 + (p1Y*0.75)/100) / (1 + p6M/100),
                q4: base / (1 + p1Y/100),           // price 12mo ago
                pct1Y: p1Y, pct6M: p6M, pct3M: p3M, pct1M: p1M
              };
            });
            done++;
            if (done === chunks.length) {
              if (status) status.textContent = 'History loaded: ' + Object.keys(histPrices).length + ' tickers';
              resolve();
            }
          }).catch(function() {
            done++;
            if (done === chunks.length) resolve();
          });
      }, ci * 300);
    });
  });
}

      }
      batchIdx++;
      setTimeout(nextBatch,100);
    }).catch(function(){batchIdx++;setTimeout(nextBatch,200);});
  }
  
  function scoreAndShow(){
    var setups=[];
    candidates.forEach(function(c2){
      var s=allSnaps[c2.t];
      if(!s||!s.day)return;
      var price=s.day.c;
      var prevClose=s.prevDay?s.prevDay.c:price;
      var chg=s.todaysChangePerc||0;
      var vol=s.day.v||0;
      var prevVol=s.prevDay?s.prevDay.v:vol;
      var volRatio=prevVol>0?(vol/prevVol)*100:100;
      var vwap=s.day.vw||price;
      var info=TI[c2.t]||["",""];
      
      // QUALITY SETUP SCORING - 80% gate
      var score=0,reasons=[],maxScore=15;
      
      // HARD FILTERS
      if(price<3)return;
      if(info[0]==="Other")return;
      if(vol<100000)return;
      var gi=G.indexOf(c2.g);
      if(gi>7)return; // Only A+ through C+
      
      // 1. RS Grade (max 3)
      if(gi<=2){score+=3;reasons.push("Top RS");}
      else if(gi<=4){score+=2;reasons.push("Strong RS");}
      else{score+=1;}
      
      // 2. Above VWAP (max 2)
      if(price>vwap){score+=2;reasons.push("Above VWAP");}
      
      // 3. Price momentum (max 2)
      if(chg>2){score+=2;reasons.push("+"+chg.toFixed(1)+"%");}
      else if(chg>0){score+=1;reasons.push("+"+chg.toFixed(1)+"%");}
      
      // 4. Volume (max 3)
      if(volRatio>200){score+=3;reasons.push("Vol "+Math.round(volRatio)+"%\u2191");}
      else if(volRatio>150){score+=2;reasons.push("Vol "+Math.round(volRatio)+"%\u2191");}
      else if(volRatio>100){score+=1;}
      
      // 5. Gap (max 2)
      var gap=prevClose>0?((s.day.o-prevClose)/prevClose)*100:0;
      if(gap>3){score+=2;reasons.push("Gap +"+gap.toFixed(1)+"%");}
      else if(gap>1){score+=1;}
      
      // 6. Sector heat (max 2)
      var theme=info[0];var topPeers=0;
      G.slice(0,6).forEach(function(g){(data[g]||[]).forEach(function(t2){if(TI[t2]&&TI[t2][0]===theme)topPeers++;});});
      if(topPeers>=7){score+=2;reasons.push(theme+" hot");}
      else if(topPeers>=4){score+=1;}
      
      // 7. Near 52W high (max 1)
      if(s.max&&s.max.price&&price>=s.max.price*0.9){score+=1;reasons.push("Near high");}
      
      // 80% QUALITY GATE
      var pct=Math.round((score/maxScore)*100);
      if(pct>=80){
        reasons.unshift(pct+"% match");
        setups.push({t:c2.t,g:c2.g,score:score,pct:pct,reasons:reasons,chg:chg,vol:volRatio,price:price});
      }
    });
    
    // Sort by score
    setups.sort(function(a,b){return b.score-a.score;});
    
    // Show results
    if(btn)btn.textContent="\uD83C\uDFAF Find Setups";
    if(status)status.textContent="\u2705 "+setups.length+" setups found";
    
    // Store setups globally + persist to localStorage
    window._todaySetups=setups;
    try{localStorage.setItem("rts_setups",JSON.stringify({date:new Date().toISOString().slice(0,10),list:setups.slice(0,50)}));}catch(e){}
    
    // Save buy candidates (tradable + score>=9 = strong setup) for Buys tab
    var buyCandidates=setups.filter(function(s2){return TRADABLE_SET.has(s2.t)&&s2.score>=9;});
    saveBuyCandidates(buyCandidates);
    
    // Show as persistent sidebar
    showSetupSidebar(setups);
    flash("\uD83C\uDFAF "+setups.length+" setups! "+buyCandidates.length+" buy candidates added.");
  }
  
  nextBatch();
};

// GAPPERS SCANNER - find stocks gapping >5%
window.scanGappers=function(){
  var btn=document.getElementById("gapScanBtn");
  if(btn)btn.textContent="\u23F3 Scanning...";
  // Use the full market snapshot
  polySnapshotAll().then(function(resp){
    var tickers=resp.tickers||[];
    var gappers=[];
    tickers.forEach(function(t){
      if(!t.day||!t.prevDay||!t.prevDay.c)return;
      var gap=((t.day.o-t.prevDay.c)/t.prevDay.c)*100;
      if(Math.abs(gap)<5)return;
      if(t.day.v<50000)return; // min volume
      if(t.day.c<1)return; // no pennies
      if(!TRADABLE_SET.has(t.ticker))return; // tradables only
      // Find grade
      var grade="";
      G.forEach(function(g){if((data[g]||[]).indexOf(t.ticker)>=0)grade=g;});
      gappers.push({t:t.ticker,gap:gap,price:t.day.c,vol:t.day.v,g:grade,chg:t.todaysChangePerc||0});
    });
    // Sort by absolute gap
    gappers.sort(function(a,b){return Math.abs(b.gap)-Math.abs(a.gap);});
    window._gappers=gappers;
    if(btn)btn.textContent="\u26A1 Scan Gappers";
    flash("\uD83D\uDCC8 "+gappers.length+" gappers found (>5% gap)");
    render();
  }).catch(function(err){
    if(btn)btn.textContent="\u26A1 Scan Gappers";
    flash("\u274C Error: "+err.message);
  });
};

      else if(sic.length>=2&&SIC_MAP[sic.substring(0,2)])theme=SIC_MAP[sic.substring(0,2)];
      // 3. Try name patterns
      if(theme==="Other"||theme==="Chemicals"||theme==="Construction"){
        for(var p=0;p<NAME_PATTERNS.length;p++){
          if(NAME_PATTERNS[p][0].test(name)){theme=NAME_PATTERNS[p][1];break;}
        }
      }
      
      // Specific overrides for SIC 28xx (distinguish Pharma vs Biotech vs Chemicals)
      if(sic.substring(0,2)==="28"){
        if(/biotech|biolog|genom/i.test(name))theme="Biotech";
        else if(/pharma|drug|thera/i.test(name))theme="Pharma";
        else if(/chem|plastic|paint|adhesive/i.test(name))theme="Chemicals";
      }
      
      if(!TI[t.ticker]){
        TI[t.ticker]=[theme,name.substring(0,30)||"Unknown"];
        added++;
      }else if(TI[t.ticker][0]==="Other"&&theme!=="Other"){
        // Reclassify existing "Other" tickers
        TI[t.ticker][0]=theme;
        if(!TI[t.ticker][1]||TI[t.ticker][1]==="Unknown")TI[t.ticker][1]=name.substring(0,30);
      }
      // Do NOT add to TRADABLE_SET — that's only prop firm tickers
    });
    
    // Add new tickers to lowest grade if not in any grade
    var lowestG=G[G.length-1];
    allTickers.forEach(function(t){
      var found=false;
      G.forEach(function(g){
        if((data[g]||[]).indexOf(t.ticker)>=0)found=true;
      });
      if(!found){
        if(!data[lowestG])data[lowestG]=[];
        data[lowestG].push(t.ticker);
      }
    });
    
    save();
    
    if(btn)btn.textContent="\uD83C\uDF10 Load All";
    if(status)status.textContent="\u2705 "+allTickers.length+" total tickers loaded, "+added+" new added";
    flash("\uD83C\uDF10 "+allTickers.length+" NYSE/NASDAQ/AMEX tickers loaded! "+added+" new.");
    window._allLoaded=true;
    render();
  }
  
  fetchPage("");
};

  _nextId: 1,

};

function _cmKey(t,d){ return (t+'::'+d).toUpperCase(); }
function _cmFmtDate(d){
  if(!d)return '';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var parts=d.split('-');
  if(parts.length!==3)return d;
  return parseInt(parts[2])+' '+months[parseInt(parts[1])-1]+' '+parts[0];
}

function _cmLoad(){
  try{
    var s=localStorage.getItem('rts_chartmoves');
    if(s){ var p=JSON.parse(s);
      _cm.ticker=p.ticker||'';
      _cm.tickers=p.tickers||( p.ticker?[p.ticker]:[] );
      _cm.dates=(p.dates||[]).map(function(d){
        // migrate old dates without ticker field — assign to first ticker
        if(!d.ticker) d.ticker=p.ticker||'';
        return d;
      });
      _cm.notes=p.notes||{};
      _cm.selectedDate=p.selectedDate||null;
      _cm._nextId=p._nextId||1;
    }
  }catch(e){}
  if(!_cm.tickers)_cm.tickers=[];
  if(!_cm._openDateFor)_cm._openDateFor=null;
}
function _cmSave(){
  try{ localStorage.setItem('rts_chartmoves', JSON.stringify({ticker:_cm.ticker,tickers:_cm.tickers,dates:_cm.dates,notes:_cm.notes,selectedDate:_cm.selectedDate,_nextId:_cm._nextId})); }catch(e){}
}

function _cmLoadChart(ticker){
  var c=document.getElementById('cm-chart-container');
  if(!c||!ticker)return;
  c.innerHTML='';
  var divId='cmtv'+Date.now();
  var div=document.createElement('div');
  div.id=divId; div.style.cssText='width:100%;height:100%';
  c.appendChild(div);
  try{
    var tvw=new TradingView.widget({
      autosize:true, symbol:ticker, interval:'W', timezone:'exchange',
      theme:'light', style:'1', locale:'en', toolbar_bg:'#f5f5f0',
      allow_symbol_change:false, save_image:false, container_id:divId,
      hide_side_toolbar:false,
      studies:['MASimple@tv-basicstudies','MAExp@tv-basicstudies'],
      disabled_features:['header_symbol_search','header_compare','header_saveload','popup_hints'],
      enabled_features:['move_logo_to_main_pane']
    });
    // Hook crosshairMove to capture hovered date
    tvw.onChartReady(function(){
      tvw.chart().crossHairMoved(function(p){
        if(!p||!p.time)return;
        // p.time is a UNIX timestamp (seconds)
        var d=new Date(p.time*1000);
        var ds=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
        _cmLastHoveredDate=ds;
        // Update the pin button hint
        var hint=document.getElementById('cm-pin-hint');
        if(hint)hint.textContent=ds;
      });
      // Click on chart = pin the date
      tvw.chart().onDataLoaded().subscribe(null,function(){
        // fallback — not all TV builds support onClick, crosshair is reliable
      });
    });
  }catch(e){}
}

function _cmParseDate(v){
  if(!v)return null;
  var s=(v||'').trim();
  // DD/MM/YYYY (from our formatter)
  var m1=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
  if(m1){
    var dy=parseInt(m1[1]),mo=parseInt(m1[2]),yr=parseInt(m1[3]);
    if(mo>=1&&mo<=12&&dy>=1&&dy<=31)
      return yr+'-'+(mo<10?'0':'')+mo+'-'+(dy<10?'0':'')+dy;
  }
  // Raw 8 digits DDMMYYYY
  if(/^\d{8}$/.test(s)){
    var dy2=parseInt(s.slice(0,2)),mo2=parseInt(s.slice(2,4)),yr2=parseInt(s.slice(4,8));
    if(mo2>=1&&mo2<=12&&dy2>=1&&dy2<=31)
      return yr2+'-'+(mo2<10?'0':'')+mo2+'-'+(dy2<10?'0':'')+dy2;
  }
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // "10 Mar 2026"
  var MMAP={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  var m2=/^(\d{1,2})\s+([A-Za-z]{3,})\s*(\d{2,4})$/.exec(s);
  if(m2){
    var mo3=MMAP[m2[2].toLowerCase().slice(0,3)];
    if(mo3){var yr3=parseInt(m2[3]);if(yr3<100)yr3+=2000;var dy3=parseInt(m2[1]);return yr3+'-'+(mo3<10?'0':'')+mo3+'-'+(dy3<10?'0':'')+dy3;}
  }
  return null;
}

window.cmAddDateForTicker=function(t,v){
  var d=_cmParseDate(v||'');
  if(!d||!t){
    var el=document.getElementById('cm-inline-date');
    if(el){el.style.borderColor='#f44336';setTimeout(function(){if(el)el.style.borderColor='#1565c0';},900);}
    return;
  }
  // Edit mode: update existing date record
  if(_cm._editDateId){
    var existing=_cm.dates.find(function(x){return x.id===_cm._editDateId;});
    if(existing){
      // Move notes to new date key
      var oldKey=_cmKey(existing.ticker,existing.date);
      var newKey=_cmKey(t,d);
      if(oldKey!==newKey&&_cm.notes[oldKey]){
        _cm.notes[newKey]=_cm.notes[oldKey];
        delete _cm.notes[oldKey];
      }
      existing.date=d;
      existing.ticker=t;
      _cm.selectedDate=existing.id;
      _cm.ticker=t;
      _cm._editDateId=null;
      _cm._openDateFor=null;
      _cmSave(); _cmRender();
      return;
    }
  }
  // Add mode: check duplicate
  var dup=_cm.dates.find(function(x){return x.ticker===t&&x.date===d;});
  if(dup){
    _cm.ticker=t; _cm.selectedDate=dup.id;
  } else {
    var newId=_cm._nextId++;
    _cm.dates.push({id:newId,date:d,ticker:t});
    _cm.ticker=t;
    _cm.selectedDate=newId;
  }
  _cm._openDateFor=null;
  _cm._editDateId=null;
  _cmSave(); _cmRender();
};

window.cmFormatDateInput=function(el){
  // Extract only digits (ignore slashes which we add ourselves)
  var digits=el.value.replace(/[^0-9]/g,'').slice(0,8);
  var out='';
  if(digits.length<=2){ out=digits; }
  else if(digits.length<=4){ out=digits.slice(0,2)+'/'+digits.slice(2); }
  else { out=digits.slice(0,2)+'/'+digits.slice(2,4)+'/'+digits.slice(4); }
  // Only update if changed (prevents cursor fighting)
  if(el.value!==out){ el.value=out; }
  try{el.setSelectionRange(out.length,out.length);}catch(e){}
}

  }).catch(function(e){
    if(resultDiv)resultDiv.innerHTML='<span style="color:#f44336">Error: '+e.message+'</span>';
  });
};

</script>
